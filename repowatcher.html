<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoWatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║                   REPOWATCH — CONFIG                         ║
// ╠══════════════════════════════════════════════════════════════╣
// ║  REPO        "owner/repository"                              ║
const REPO = "torvalds/linux";
//                                                                ║
// ║  THEME       "dark" | "catppuccin-mocha" | "light" | "catppuccin-latte"
const ACTIVE_THEME = "dark";
//                                                                ║
// ║  AUTO_REFRESH  minutes between refreshes (0 = off)           ║
const AUTO_REFRESH = 5;
// ╚══════════════════════════════════════════════════════════════╝

const THEMES = {
  "dark": {
    bg:"#090b0e",bg2:"#0d1117",bg3:"#131920",bg4:"#1a2230",
    border:"rgba(255,255,255,0.06)",border2:"rgba(255,255,255,0.11)",border3:"rgba(255,255,255,0.18)",
    text:"#dde4f0",text2:"#a0aec0",muted:"#4a5568",
    accent:"#4a9eff",accent2:"#7c6af5",green:"#38c98a",amber:"#f5a623",red:"#f56565",pink:"#d66bac",
    scanlines:true,grain:true,
  },
  "catppuccin-mocha": {
    bg:"#1e1e2e",bg2:"#181825",bg3:"#313244",bg4:"#45475a",
    border:"rgba(205,214,244,0.07)",border2:"rgba(205,214,244,0.13)",border3:"rgba(205,214,244,0.22)",
    text:"#cdd6f4",text2:"#a6adc8",muted:"#585b70",
    accent:"#89b4fa",accent2:"#cba6f7",green:"#a6e3a1",amber:"#f9e2af",red:"#f38ba8",pink:"#f5c2e7",
    scanlines:false,grain:false,
  },
  "light": {
    bg:"#f0f4fa",bg2:"#ffffff",bg3:"#e8edf7",bg4:"#d8e0f0",
    border:"rgba(30,50,100,0.08)",border2:"rgba(30,50,100,0.13)",border3:"rgba(30,50,100,0.22)",
    text:"#18243e",text2:"#526080",muted:"#9aaac5",
    accent:"#1a6ef5",accent2:"#6c4de6",green:"#159a5e",amber:"#c47d09",red:"#d63030",pink:"#be3f8a",
    scanlines:false,grain:false,
  },
  "catppuccin-latte": {
    bg:"#eff1f5",bg2:"#ffffff",bg3:"#e6e9f0",bg4:"#dce0ea",
    border:"rgba(76,79,105,0.09)",border2:"rgba(76,79,105,0.16)",border3:"rgba(76,79,105,0.26)",
    text:"#4c4f69",text2:"#7c7f93",muted:"#acb0be",
    accent:"#1e66f5",accent2:"#7287fd",green:"#40a02b",amber:"#df8e1d",red:"#d20f39",pink:"#ea76cb",
    scanlines:false,grain:false,
  },
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Space Mono',monospace;font-size:13px;line-height:1.6;overflow-x:hidden}
#ov-scan{position:fixed;inset:0;pointer-events:none;z-index:9000;display:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.055) 2px,rgba(0,0,0,0.055) 4px)}
#ov-grain{position:fixed;inset:0;pointer-events:none;z-index:8999;opacity:0.028;display:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px}
.app{min-height:100vh;padding:2rem 2.5rem 5rem;max-width:1160px;margin:0 auto;display:flex;flex-direction:column;justify-content:center}

.repo-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:1.5rem;flex-wrap:wrap}
.repo-name-block{display:flex;flex-direction:column;gap:5px;min-width:0}
.repo-full{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.5px;line-height:1.2}
.repo-full a{color:var(--text);text-decoration:none}
.repo-full a:hover{color:var(--accent)}
.repo-owner{color:var(--text2)}
.repo-desc{font-size:12px;color:var(--text2);font-style:italic;line-height:1.55;max-width:580px}
.topics{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.topic{font-size:10px;padding:2px 8px;border-radius:100px;border:1px solid var(--accent-dim);color:var(--accent);letter-spacing:0.04em}
.repo-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.lang-badge{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 11px;border-radius:100px;background:var(--bg3);border:1px solid var(--border2);color:var(--text)}
.lang-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.updated{font-size:10px;color:var(--muted)}

.state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:5rem 2rem;text-align:center}
.state.on{display:flex;animation:fadeup 0.3s ease both}
.state-icon{font-size:28px;opacity:0.3}
.state-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);opacity:0.45}
.state-sub{font-size:11px;color:var(--muted);max-width:340px;line-height:1.6}
.state.err .state-title{color:var(--red);opacity:1}
.spinner{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:spin 0.65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.dash{display:none}
.dash.on{display:block;animation:fadeup 0.38s ease both}

.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:11px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:15px 17px;position:relative;overflow:hidden;transition:border-color 0.18s,transform 0.18s}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.clabel{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.cval{font-family:'Syne',sans-serif;font-size:25px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--text)}
.csub{font-size:10px;color:var(--muted);margin-top:5px}
.cbar{position:absolute;bottom:0;left:0;right:0;height:2px}

.wide-grid{display:grid;grid-template-columns:2fr 1fr;gap:11px;margin-bottom:11px}
.commit-sha{font-size:10px;color:var(--accent);margin-bottom:7px;letter-spacing:0.06em}
.commit-msg{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.45;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.commit-meta{display:flex;align-items:center;gap:11px;font-size:10px;color:var(--muted);flex-wrap:wrap}
.commit-author{display:flex;align-items:center;gap:6px}
.av{width:16px;height:16px;border-radius:50%;overflow:hidden;background:var(--bg4);flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.commit-branch{color:var(--accent2)}
.branch-list{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.branch-item{display:flex;align-items:center;justify-content:space-between;font-size:10px;padding:5px 8px;border-radius:6px;background:var(--bg3);border:1px solid var(--border)}
.bname{color:var(--text);overflow:hidden;min-width:0;white-space:nowrap;text-overflow:ellipsis}
.b-default{font-size:9px;padding:1px 6px;border-radius:100px;flex-shrink:0;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-dim)}

.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.issue-list{display:flex;flex-direction:column;gap:7px;margin-top:2px}
.issue-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);text-decoration:none;transition:border-color 0.15s}
.issue-item:hover{border-color:var(--border2)}
.issue-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:4px}
.issue-body{flex:1;min-width:0}
.ititle{font-size:11px;color:var(--text);line-height:1.4;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imeta{font-size:10px;color:var(--muted)}
.ilabels{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.ilabel{font-size:9px;padding:1px 6px;border-radius:100px;border:1px solid var(--border2);color:var(--text2)}
.no-issues{font-size:11px;color:var(--muted);text-align:center;padding:2rem;font-style:italic}
.lang-bar-track{display:flex;height:5px;border-radius:3px;overflow:hidden;gap:2px;margin-bottom:13px;margin-top:4px}
.lang-seg{border-radius:2px}
.lang-rows{display:flex;flex-direction:column;gap:7px}
.lang-row{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.lang-left{display:flex;align-items:center;gap:7px}
.lang-swatch{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.lang-name{color:var(--text)}
.lang-pct{font-size:10px;color:var(--muted)}
.slabel{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}

@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr)}.wide-grid{grid-template-columns:1fr}.bottom-grid{grid-template-columns:1fr}}
@media(max-width:560px){.app{padding:1.25rem 1.25rem 4rem}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="ov-scan"></div>
<div id="ov-grain"></div>
<div class="app">

  <div class="state on" id="s-load">
    <div class="spinner"></div>
    <div class="state-title" id="loading-label"></div>
  </div>

  <div class="state err" id="s-err">
    <div class="state-icon">✕</div>
    <div class="state-title" id="err-title">Error</div>
    <div class="state-sub" id="err-sub"></div>
  </div>

  <div class="dash" id="dashboard">
    <div class="repo-bar">
      <div class="repo-name-block">
        <div class="repo-full">
          <a id="repo-link" href="#" target="_blank" rel="noopener">
            <span class="repo-owner" id="r-owner"></span>/<span id="r-name"></span>
          </a>
        </div>
        <div class="repo-desc" id="r-desc"></div>
        <div class="topics" id="r-topics"></div>
      </div>
      <div class="repo-right">
        <div class="lang-badge">
          <div class="lang-dot" id="r-langdot"></div>
          <span id="r-lang">—</span>
        </div>
        <span class="updated" id="r-updated"></span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card"><div class="clabel">Stars</div><div class="cval" id="s-stars">—</div><div class="cbar" style="background:var(--amber)"></div></div>
      <div class="card"><div class="clabel">Watchers</div><div class="cval" id="s-watchers">—</div><div class="cbar" style="background:var(--accent)"></div></div>
      <div class="card"><div class="clabel">Forks</div><div class="cval" id="s-forks">—</div><div class="cbar" style="background:var(--accent2)"></div></div>
      <div class="card"><div class="clabel">Open Issues</div><div class="cval" id="s-issues">—</div><div class="cbar" style="background:var(--green)"></div></div>
      <div class="card"><div class="clabel">Branches</div><div class="cval" id="s-branches">—</div><div class="cbar" style="background:var(--pink)"></div></div>
      <div class="card"><div class="clabel">Repo Size</div><div class="cval" id="s-size">—</div><div class="csub" id="s-sizesub"></div><div class="cbar" style="background:var(--red)"></div></div>
    </div>

    <div class="wide-grid">
      <div class="card">
        <div class="slabel">Latest Commit</div>
        <div class="commit-sha" id="c-sha"></div>
        <div class="commit-msg" id="c-msg">—</div>
        <div class="commit-meta">
          <div class="commit-author">
            <div class="av"><img id="c-avatar" src="" alt=""></div>
            <span id="c-author">—</span>
          </div>
          <span id="c-time">—</span>
          <span class="commit-branch" id="c-branch"></span>
        </div>
      </div>
      <div class="card">
        <div class="slabel">Branches</div>
        <div class="branch-list" id="branch-list"></div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="card">
        <div class="slabel">Open Issues</div>
        <div class="issue-list" id="issue-list"></div>
      </div>
      <div class="card">
        <div class="slabel">Languages</div>
        <div class="lang-bar-track" id="lang-bar"></div>
        <div class="lang-rows" id="lang-rows"></div>
      </div>
    </div>
  </div>

</div>
<script>
const LANG_COLORS={JavaScript:"#f1e05a",TypeScript:"#3178c6",Python:"#3572a5",Java:"#b07219","C++":"#f34b7d",C:"#555555","C#":"#178600",Go:"#00add8",Rust:"#dea584",Ruby:"#701516",PHP:"#4f5d95",Swift:"#f05138",Kotlin:"#a97bff",Dart:"#00b4ab",HTML:"#e34c26",CSS:"#563d7c",SCSS:"#c6538c",Shell:"#89e051",PowerShell:"#012456",Lua:"#000080",Haskell:"#5e5086",Elixir:"#6e4a7e",Clojure:"#db5855",Scala:"#dc322f",R:"#198ce7",Perl:"#0298c3",Zig:"#ec915c",Nix:"#7e7eff",Vue:"#41b883",Svelte:"#ff3e00",Dockerfile:"#384d54",Assembly:"#6e4c13",MATLAB:"#e16737",Makefile:"#427819"};
function lc(n){return LANG_COLORS[n]||"#666"}
function h2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}

(function(){
  const t=THEMES[ACTIVE_THEME]||THEMES["dark"];
  const s=(k,v)=>document.documentElement.style.setProperty(k,v);
  const rgb=h=>h2rgb(h).join(",");
  s("--bg",t.bg);s("--bg2",t.bg2);s("--bg3",t.bg3);s("--bg4",t.bg4);
  s("--border",t.border);s("--border2",t.border2);s("--border3",t.border3);
  s("--text",t.text);s("--text2",t.text2);s("--muted",t.muted);
  s("--accent",t.accent);s("--accent2",t.accent2);
  s("--green",t.green);s("--amber",t.amber);s("--red",t.red);s("--pink",t.pink);
  s("--accent-glow",`rgba(${rgb(t.accent)},0.14)`);
  s("--accent-dim",`rgba(${rgb(t.accent)},0.3)`);
  s("--accent-bg",`rgba(${rgb(t.accent)},0.1)`);
  s("--green-dim",`rgba(${rgb(t.green)},0.35)`);
  s("--amber-bg",`rgba(${rgb(t.amber)},0.08)`);
  s("--amber-dim",`rgba(${rgb(t.amber)},0.3)`);
  document.body.style.background=t.bg;
  document.body.style.color=t.text;
  document.getElementById("ov-scan").style.display=t.scanlines?"block":"none";
  document.getElementById("ov-grain").style.display=t.grain?"block":"none";
  document.title=`RepoWatch — ${REPO}`;
})();

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"k";return String(n)}
function fmtSize(kb){if(kb>=1048576)return(kb/1048576).toFixed(1)+" GB";if(kb>=1024)return(kb/1024).toFixed(1)+" MB";return kb+" KB"}
function ago(d){const s=(Date.now()-new Date(d))/1000;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<2592000)return Math.floor(s/86400)+"d ago";if(s<31536000)return Math.floor(s/2592000)+"mo ago";return Math.floor(s/31536000)+"y ago"}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function setState(id){["s-load","s-err","dashboard"].forEach(i=>document.getElementById(i).classList.remove("on"));document.getElementById(id).classList.add("on")}

let _commitDate=null,_loadedAt=null,_ticker=null;
function startTicker(){
  if(_ticker)clearInterval(_ticker);
  _ticker=setInterval(()=>{
    if(_commitDate)document.getElementById("c-time").textContent=ago(_commitDate);
    if(_loadedAt)document.getElementById("r-updated").textContent="Updated "+ago(_loadedAt);
  },30000);
}

async function gh(path){
  const r=await fetch("https://api.github.com"+path);
  if(!r.ok){const e=new Error(r.statusText);e.status=r.status;throw e}
  return r.json();
}

async function fetchAndRender(){
  setState("s-load");
  document.getElementById("loading-label").textContent=REPO;
  try{
    const[repo,branches,issues,langs,commits]=await Promise.all([
      gh(`/repos/${REPO}`),
      gh(`/repos/${REPO}/branches?per_page=10`),
      gh(`/repos/${REPO}/issues?state=open&per_page=8&filter=all`),
      gh(`/repos/${REPO}/languages`),
      gh(`/repos/${REPO}/commits?per_page=1`),
    ]);
    render(repo,branches,issues,langs,commits);
    setState("dashboard");
    _loadedAt=new Date().toISOString();
    document.getElementById("r-updated").textContent="Updated just now";
    startTicker();
    if(AUTO_REFRESH>0)setTimeout(fetchAndRender,AUTO_REFRESH*60*1000);
  }catch(e){
    if(e.status===404){document.getElementById("err-title").textContent="Repository not found";document.getElementById("err-sub").textContent=`"${REPO}" doesn't exist or is private.`}
    else if(e.status===403||e.status===429){document.getElementById("err-title").textContent="Rate limited";document.getElementById("err-sub").textContent="GitHub API limit hit. Retrying in 60s.";setTimeout(fetchAndRender,60000)}
    else{document.getElementById("err-title").textContent="Failed to load";document.getElementById("err-sub").textContent="Check your connection. Retrying in 30s.";setTimeout(fetchAndRender,30000)}
    setState("s-err");
  }
}

function render(repo,branches,issues,langs,commits){
  document.getElementById("r-owner").textContent=repo.owner.login;
  document.getElementById("r-name").textContent=repo.name;
  document.getElementById("repo-link").href=repo.html_url;
  document.getElementById("r-desc").textContent=repo.description||"";
  const pl=repo.language||"—";
  document.getElementById("r-lang").textContent=pl;
  document.getElementById("r-langdot").style.background=lc(pl);
  const tp=document.getElementById("r-topics");tp.innerHTML="";
  (repo.topics||[]).slice(0,7).forEach(t=>{const s=document.createElement("span");s.className="topic";s.textContent=t;tp.appendChild(s)});
  document.getElementById("s-stars").textContent=fmt(repo.stargazers_count);
  document.getElementById("s-watchers").textContent=fmt(repo.subscribers_count||repo.watchers_count);
  document.getElementById("s-forks").textContent=fmt(repo.forks_count);
  document.getElementById("s-issues").textContent=fmt(repo.open_issues_count);
  document.getElementById("s-branches").textContent=fmt(branches.length);
  document.getElementById("s-size").textContent=repo.size>=1024?Math.round(repo.size/1024)+" MB":repo.size+" KB";
  document.getElementById("s-sizesub").textContent=fmtSize(repo.size);
  if(commits&&commits.length){
    const c=commits[0];
    document.getElementById("c-sha").textContent=c.sha.slice(0,7);
    document.getElementById("c-msg").textContent=c.commit.message.split("\n")[0];
    _commitDate=c.commit.author.date;
    document.getElementById("c-time").textContent=ago(_commitDate);
    document.getElementById("c-author").textContent=c.commit.author.name;
    document.getElementById("c-branch").textContent="→ "+repo.default_branch;
    const av=document.getElementById("c-avatar");
    av.src=c.author?c.author.avatar_url+"&s=32":"";
    av.onerror=()=>{av.style.display="none"};
  }
  const bl=document.getElementById("branch-list");bl.innerHTML="";
  branches.forEach(b=>{
    const row=document.createElement("div");row.className="branch-item";
    row.innerHTML=`<span class="bname">${esc(b.name)}</span>${b.name===repo.default_branch?'<span class="b-default">default</span>':""}`;
    bl.appendChild(row);
  });
  const il=document.getElementById("issue-list");il.innerHTML="";
  const real=issues.filter(i=>!i.pull_request);
  if(!real.length){il.innerHTML='<div class="no-issues">No open issues ✓</div>'}
  else real.forEach(issue=>{
    const a=document.createElement("a");a.className="issue-item";a.href=issue.html_url;a.target="_blank";a.rel="noopener";
    const lbls=(issue.labels||[]).map(l=>`<span class="ilabel">${esc(l.name)}</span>`).join("");
    a.innerHTML=`<div class="issue-dot"></div><div class="issue-body"><div class="ititle">${esc(issue.title)}</div><div class="imeta">#${issue.number} · ${ago(issue.created_at)}</div>${lbls?`<div class="ilabels">${lbls}</div>`:""}</div>`;
    il.appendChild(a);
  });
  const total=Object.values(langs).reduce((a,b)=>a+b,0)||1;
  const sorted=Object.entries(langs).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const bar=document.getElementById("lang-bar"),rows=document.getElementById("lang-rows");
  bar.innerHTML="";rows.innerHTML="";
  sorted.forEach(([name,bytes])=>{
    const pct=(bytes/total)*100;
    const seg=document.createElement("div");seg.className="lang-seg";seg.style.flex=pct;seg.style.background=lc(name);seg.title=`${name} ${pct.toFixed(1)}%`;bar.appendChild(seg);
    const row=document.createElement("div");row.className="lang-row";
    row.innerHTML=`<div class="lang-left"><div class="lang-swatch" style="background:${lc(name)}"></div><span class="lang-name">${esc(name)}</span></div><span class="lang-pct">${pct.toFixed(1)}%</span>`;
    rows.appendChild(row);
  });
}

fetchAndRender();
</script>
</body>
</html>
